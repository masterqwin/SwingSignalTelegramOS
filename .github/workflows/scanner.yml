name: SwingSignal Scanner

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: swing-signal-scanner
  cancel-in-progress: false

jobs:
  scanner-once:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      USDTHB_RATE: ${{ secrets.USDTHB_RATE }}
      SIGNAL_EXPIRY_DAYS: 3
      SCAN_INTERVAL_MINUTES: 5
      MAX_ACTIVE_SIGNALS: 5
      DEFAULT_STAKE_THB: 20000
      STARTING_CAPITAL_THB: 200000
      MAX_DCA_ENTRIES: 3
      RECOVERY_DROP_PCT: 5
      RECOVERY_SCORE_THRESHOLD: 88
      DATABASE_PATH: ./data/swing_signal.sqlite
      DEBUG_SIGNAL: ${{ vars.DEBUG_SIGNAL || secrets.DEBUG_SIGNAL || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize database
        run: npm run db:init

      - name: Seed coin universe
        run: npm run db:seed

      - name: Run scanner once
        run: npm run scanner:once

      - name: Commit scanner state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/swing_signal.sqlite
          if git diff --cached --quiet; then
            echo "[scanner] no SQLite state changes to commit"
            exit 0
          fi
          git commit -m "Update scanner state [skip ci]"
          git pull --rebase
          git push
