name: SwingSignal Scanner

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: swing-signal-scanner
  cancel-in-progress: false

jobs:
  scanner-once:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      USDTHB_RATE: ${{ secrets.USDTHB_RATE }}
      MARKET_PROVIDER: binance_spot
      DEBUG_SIGNAL: "false"
      SIGNAL_EXPIRY_DAYS: 3
      SCAN_INTERVAL_MINUTES: 15
      MAX_ACTIVE_SIGNALS: 5
      DEFAULT_STAKE_THB: 20000
      STARTING_CAPITAL_THB: 200000
      MAX_DCA_ENTRIES: 3
      RECOVERY_DROP_PCT: 5
      RECOVERY_SCORE_THRESHOLD: 88
      TRADING_FEE_PCT: 0.2
      SLIPPAGE_BUFFER_PCT: 0.15
      MIN_NET_PROFIT_TP1_PCT: 0.8
      MIN_NET_PROFIT_TP2_PCT: 1.8
      POSITION_PLAN_DAYS: 3
      TP2_GRACE_DAYS: 2
      ENTRY_RETRACE_BUFFER_PCT: 0
      DATABASE_PATH: ./data/swing_signal.sqlite
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run db:init
      - run: npm run db:seed
      - run: npm run scanner:once
      - name: Commit meaningful scanner state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/swing_signal.sqlite
          if git diff --cached --quiet; then
            echo "[persistence] meaningful_change=false"
            exit 0
          fi
          echo "[persistence] meaningful_change=true"
          for i in 1 2 3; do
            git commit -m "Update scanner state [skip ci]" || true
            git pull --rebase && git push && exit 0
            sleep 5
          done
          exit 1
