name: SwingSignal Monthly Report

on:
  schedule:
    - cron: "0 1 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monthly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      USDTHB_RATE: ${{ secrets.USDTHB_RATE }}
      MARKET_PROVIDER: binance_spot
      DATABASE_PATH: ./data/swing_signal.sqlite
      DEBUG_SIGNAL: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run db:init
      - run: npm run report:monthly
      - name: Commit monthly report state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/swing_signal.sqlite
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Update monthly report state [skip ci]"
          git pull --rebase
          git push
